<title>efeavcii2 — CTF Writeups</title>
<style>
  :root{
    --bg:#F2F3F6; --surface:#FFFFFF; --ink:#12151C; --ink-soft:#545B6B;
    --line:#D7DAE2; --accent:#A87C1E;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0B0E14; --surface:#12151D; --ink:#E7E9EF; --ink-soft:#9AA3B5; --line:#232838; --accent:#D9B453; }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);

  .list{display:flex; flex-direction:column; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  a.item{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--surface); padding:18px 20px; text-decoration:none; color:var(--ink);
  }
  a.item:hover{background:var(--bg);}
  a.item .t{font-weight:600;}
  a.item .m{font-family:ui-monospace,SFMono-Regular,Consolas,monospace; font-size:.75rem; color:var(--ink-soft);}
  footer{margin-top:48px; color:var(--ink-soft); font-size:.85rem;}
</style>
</head>
